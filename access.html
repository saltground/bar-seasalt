    <link rel="stylesheet" href="./css/animations.css">
    <style>
        .info-list {
            margin-top: 2rem;
        }
        .info-list dt {
            color: var(--accent-color);
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            font-family: var(--font-serif);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .info-list dd {
            margin-bottom: 2rem;
            margin-left: 0;
            line-height: 1.8;
            font-size: 0.95rem;
        }
        .map-placeholder {
            width: 100%;
            height: 300px;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            border: 1px dashed var(--border-color);
            margin-top: 3rem;
            letter-spacing: 0.1em;

<body class="fade-in">
    <header class="global-header">
        <h1 class="logo"><a href="index.html">Bar SeaSalt</a></h1>
        <button class="hamburger-menu" aria-label="メニューを開く" id="menu-toggle">
            <span class="hamburger-line"></span>

        </button>
        <nav class="global-nav" id="global-nav">
            <ul>

    <main class="page-main">
        <section class="container section-inner fade-in-up delay-1">
            <h2 class="section-title">Access</h2>
            <p class="section-desc">隠れ家のような空間でお待ちしております。</p>
            
            <div class="access-info">
                <dl class="info-list">
                    <dt>Address</dt>
                    <dd>
                        非公開<br>
                        <span style="font-size: 0.85em; color: var(--text-muted);">（某企業の借り上げ社宅にあるため、ご来店の際は店主へ直接ご連絡ください）</span>
                    </dd>
                    
                    <dt>Access</dt>
                    <dd>
                        JR中央線・武蔵野線「西国分寺駅」より徒歩数分<br>
                        <span style="font-size: 0.85em; color: var(--text-muted);">住所非公開の隠れ家のため、西国分寺駅まで店主またはスタッフがお迎えに上がります。</span>
                    </dd>
                    
                    <dt>Open</dt>
                    <dd>13時～Last / 営業日は要相談</dd>
                </dl>
            </div>
            
            <div class="map-placeholder" style="border: none; background: transparent; height: 350px;">
