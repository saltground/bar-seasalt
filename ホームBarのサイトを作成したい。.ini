- ホームBarの名前「Bar SeaSalt」
- ホームBarのコンセプト：
    「Curate & Sip: トレンドとトラディショナルが香るBar」
    "Bar SeaSalt"は、単なるBarではありません。端的に言えば、美術館や博物館の特別展。ここは、テーマやメッセージを元にした収集・編集の場であり、その体験を飲み物に込めて楽しむことができる特別な空間です。ゲスト自身がテーマを持ち込むことも、我々がテーマを提案し選んでいただくことも可能です。バーテンダーやディスティラーが創造力を発揮したものを芸術作品のようにドリンクとして提供します。
来訪するたびに新しい発見があり、トレンドとトラディショナルを体の内で観賞する特別な体験をお楽しみください。
- ページの更新について：
    - ページ「menu」は更新しやすいように作成すること
    - ページ「Home」からページ「menu」へ飛ぶリンクはその都度設定したページにリンクしやすいように作成すること
    - ページ「menu」はカクテルに対して、「カクテル名」「材料」「カクテルの説明」が表示できるようにすること。画像は用いない。
    
